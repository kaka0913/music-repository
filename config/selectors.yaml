# =============================================================================
# CSS セレクタ定義
# =============================================================================
#
# 重要: Apple Music は Web Components (Stencil/Ember.js) + Shadow DOM、
#        Amazon Music は React + 動的クラス名を使用しているため、
#        セレクタは頻繁に変更される可能性があります。
#
# 検証手順:
#   1. python tools/verify_selectors.py --service all --suggest --no-headless
#   2. NG のセレクタを suggestion の結果で更新
#   3. 再度 verify_selectors.py で確認
#
# セレクタが全滅する場合は Cookie 有効期限切れの可能性もあります。
# その場合は python tools/refresh_cookie.py --service <service> を実行してください。
# =============================================================================

apple_music:
  # --- 認証 ---
  login_url: "https://music.apple.com/login"
  logged_in_indicator: ".web-navigation__auth-button, [class*='user'], [data-testid='user-menu']"

  # --- プレイリストページ ---
  playlist_track_row: ".songs-list-row, [class*='songs-list'] [role='row']"
  track_title: ".songs-list-row__song-name, [class*='song-name']"
  track_artist: ".songs-list-row__by-line, [class*='by-line']"

  # --- 検索 ---
  search_input: "input[type='search'], [class*='search'] input, [aria-label*='Search'] input"
  search_result_row: ".search-result-row, [class*='search-result'] [role='listitem']"
  add_to_playlist_button: "[data-testid='add-to-playlist'], [aria-label*='Add to Playlist'], [class*='add-to-playlist']"

  # --- ライブラリページ ---
  library_playlist_row: "[class*='playlist'], [data-testid*='playlist'], a[href*='playlist']"
  library_playlist_name: "[data-testid*='title'], [class*='playlist'] [class*='title']"
  library_playlist_link: "a[href*='/playlist/']"

  # --- プレイリスト作成 ---
  # Apple Music Web はプレイリスト作成非対応。create_playlist() は ScrapingError を送出する。
  # 新規プレイリストは Apple Music アプリ (iOS/Mac) で手動作成が必要。

amazon_music:
  # --- 認証 ---
  login_url: "https://music.amazon.co.jp"
  # nav#music-navbar と #accountSetting はログイン済みページで存在する要素
  logged_in_indicator: "nav#music-navbar, #accountSetting, #navbarMusicLogo"

  # --- プレイリストページ ---
  # Amazon Music は Web Components (music-*) + Shadow DOM を使用。
  # Playwright の CSS セレクタは Shadow DOM を自動透過する。
  # ライブラリ = music-vertical-item、プレイリスト内トラック = music-image-row
  # コンテンツは遅延ロードされるため、wait_for_selector 等で待機が必要。
  playlist_track_row: "music-image-row"
  track_title: "music-link:not([kind])"
  track_artist: "music-link[kind='secondary']"

  # --- 検索 ---
  search_input: "#navbarSearchInput, input[type='search'], [class*='search'] input"
  search_result_row: "music-vertical-item, [class*='searchResult'] [class*='row']"
  add_to_playlist_button: "music-button[icon-name='add'], [class*='addToPlaylist']"

  # --- ライブラリページ ---
  # music-vertical-item が各プレイリストカード。primary-text 属性にプレイリスト名を持つ。
  library_playlist_row: "music-vertical-item"
  library_playlist_name: "music-link"
  library_playlist_link: "a[href*='/playlists/'], a[href*='/playlist/']"

  # --- プレイリスト作成 ---
  # music-button[icon-name='add'] = 「プレイリストを作成」ボタン
  new_playlist_button: "music-button[icon-name='add']"
  new_playlist_name_input: "input[type='text'], input[placeholder*='プレイリスト'], input[placeholder*='Playlist']"
  new_playlist_confirm: "music-button[variant='accent'], button[type='submit']"
