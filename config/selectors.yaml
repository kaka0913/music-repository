apple_music:
  login_url: "https://music.apple.com/login"
  logged_in_indicator: "[data-testid='user-menu']"
  playlist_track_row: ".songs-list-row"
  track_title: ".songs-list-row__song-name"
  track_artist: ".songs-list-row__by-line"
  search_input: "input[type='search']"
  search_result_row: ".search-result-row"
  add_to_playlist_button: "[data-testid='add-to-playlist']"
  # ライブラリページ用
  library_playlist_row: ".shelf-grid__body .shelf-grid__list-item"
  library_playlist_name: ".shelf-grid__list-item__title"
  library_playlist_link: "a[href*='/playlist/']"
  # プレイリスト作成用
  new_playlist_button: "[data-testid='new-playlist-button']"
  new_playlist_name_input: "[data-testid='playlist-name-input']"
  new_playlist_confirm: "[data-testid='playlist-create-confirm']"

amazon_music:
  login_url: "https://music.amazon.co.jp"
  logged_in_indicator: "#navbarMusicTitle"
  playlist_track_row: ".trackRow"
  track_title: ".trackTitle"
  track_artist: ".trackArtist"
  search_input: "#searchInput"
  search_result_row: ".searchResultRow"
  add_to_playlist_button: ".addToPlaylistButton"
  # ライブラリページ用
  library_playlist_row: ".playlistCard"
  library_playlist_name: ".playlistCard__title"
  library_playlist_link: "a[href*='/playlists/']"
  # プレイリスト作成用
  new_playlist_button: "#createPlaylistButton"
  new_playlist_name_input: "#playlistNameInput"
  new_playlist_confirm: "#createPlaylistConfirm"
